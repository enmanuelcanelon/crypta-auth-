name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build APK
        run: npm run apk:debug
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

      - name: Prepare APK for release
        run: cp android/app/build/outputs/apk/debug/app-debug.apk crypta-auth.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: CRYPTA Auth v1.0.${{ github.run_number }}
          body: |
            ## Instalar en Android (app nativa)

            1. Descarga **crypta-auth.apk** abajo
            2. Ábrelo en tu teléfono
            3. Si lo pide, activa **Instalar apps desconocidas**
            4. Abre **CRYPTA Auth** desde el launcher — no es navegador

            Compilado: ${{ github.sha }}
          files: crypta-auth.apk
          make_latest: true
